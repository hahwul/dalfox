# WAF detection rules. Loaded once at startup via include_str!() so the
# binary stays single-file. Keep waf_type strings in sync with the
# WafType enum in src/waf/mod.rs — unknown values fall through to the
# generic "Unknown" with the original string preserved as the hint.
#
# Header rules
#   header           — header name (case-insensitive lookup)
#   value_contains   — optional case-insensitive substring on the value;
#                      omit to match on header presence alone
#   waf_type         — name of the WafType enum variant
#   confidence       — 0.0–1.0; max wins per WAF type during merge
#   evidence_label   — short description shown in target_summary

# ── Header rules ────────────────────────────────────────────────────────

# Cloudflare
[[header]]
header = "cf-ray"
waf_type = "Cloudflare"
confidence = 0.9
evidence_label = "cf-ray header"

[[header]]
header = "cf-cache-status"
waf_type = "Cloudflare"
confidence = 0.7
evidence_label = "cf-cache-status header"

[[header]]
header = "server"
value_contains = "cloudflare"
waf_type = "Cloudflare"
confidence = 0.95
evidence_label = "Server: cloudflare"


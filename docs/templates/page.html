{% include "header.html" %}
  <div class="docs-layout">
{% include "sidebar.html" %}
    <main class="docs-main" id="main">
      <div class="docs-content-container">
        <article class="docs-article">
          <h1>{{ page.title | e }}</h1>
          {{ content }}
        </article>
        {% if page.toc and toc %}
        <aside class="docs-toc">
          <div class="toc-title">{% if page_language == "ko" %}목차{% else %}On this page{% endif %}</div>
          <div class="toc-content">
            {{ toc }}
          </div>
        </aside>
        {% endif %}
      </div>
{% set has_source = true %}
{% include "footer.html" %}

{% include "header.html" %}
  <main class="landing" id="main">
    {{ content }}
  </main>
  <div class="search-overlay" id="searchOverlay">
    <div class="search-modal">
      <div class="search-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Search documentation..." aria-label="Search documentation" autocomplete="off">
        <kbd>ESC</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
  <footer class="site-footer">
    <div class="footer-mark">
      <a href="https://www.hahwul.com" target="_blank" rel="noopener">
        <img src="{{ base_url }}/images/hahwul.webp" class="hahwul-img" alt="hahwul">
      </a>
      <p class="footer-love">Built with Love</p>
    </div>
  </footer>
  <script src="{{ base_url }}/assets/js/highlight.min.js"></script>
  <script src="{{ base_url }}/js/search.js"></script>
  <script src="{{ base_url }}/js/ui.js"></script>
  <script src="{{ base_url }}/js/landing.js"></script>
  {{ auto_includes_js }}
</body>
</html>

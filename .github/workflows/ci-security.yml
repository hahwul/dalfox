---
name: Security Audit
on:
  push:
    branches: [main]
    paths: [Cargo.toml, Cargo.lock, .github/workflows/ci-security.yml]
  pull_request:
    branches: [main]
    paths: [Cargo.toml, Cargo.lock, .github/workflows/ci-security.yml]
  schedule:
    # Weekly: catch newly-disclosed RUSTSEC advisories even when the
    # dependency tree itself has not changed.
    - cron: "0 6 * * 1"
  workflow_dispatch:
permissions:
  contents: read
  issues: write
  checks: write
jobs:
  audit:
    name: cargo audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071 (Marvin Attack timing side-channel in rsa 0.9):
          # Required by the interactsh OOB/OAST blind-XSS feature (RSA-2048 key
          # registration + OAEP-wrapped per-poll AES key). Decryption happens
          # locally inside the poller during a short user-initiated scan; there
          # is no long-lived remote oracle an attacker can use for key recovery.
          # No non-vulnerable drop-in replacement matches the interactsh wire
          # protocol today. We ignore for this intentional dependency.
          ignore: RUSTSEC-2023-0071

---
name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to use for the build (e.g. v3.0.1-test)'
        required: true
        default: 'v0.0.0-test'
      upload:
        description: 'Upload artifacts to a release (only works on actual releases)'
        required: true
        default: false
        type: boolean
env:
  CARGO_TERM_COLOR: always
jobs:
  build-and-upload:
    name: Build and upload
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # Required to upload release assets
    strategy:
      matrix:
        include:
          # Linux targets
          - build: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - build: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            use_cross: false
          # Linux musl (static)
          - build: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: false
            musl: true
          - build: linux-aarch64-musl
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: false
            musl: true
            zig: true
          # macOS targets
          - build: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - build: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false # Apple Silicon Macs can build for both architectures natively
          # Windows targets
          - build: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          fi
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Install musl tools
        if: matrix.musl == true && !matrix.zig
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Configure musl linker
        if: matrix.musl == true && !matrix.zig
        run: |
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> $GITHUB_ENV
      - name: Install zig
        if: matrix.zig == true
        run: |
          ZIG_VERSION="0.14.0"
          curl -fL --retry 3 "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ -C /tmp
          echo "/tmp/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH
      - name: Configure zig linker (aarch64 musl)
        if: matrix.zig == true
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=zig cc" >> $GITHUB_ENV
      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --verbose --release --target ${{ matrix.target }}
          else
            cargo build --verbose --release --target ${{ matrix.target }}
          fi
      - name: Build archive
        shell: bash
        run: |
          binary_name="dalfox"
          dirname="$binary_name-$VERSION-${{ matrix.build }}"
          mkdir "$dirname"

          # Move the appropriate binary into the archive directory
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv "target/${{ matrix.target }}/release/$binary_name.exe" "$dirname"
          else
            mv "target/${{ matrix.target }}/release/$binary_name" "$dirname"
          fi

          # Create the appropriate archive format for each OS
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$dirname.zip" "$dirname"
            echo "ASSET=$dirname.zip" >> $GITHUB_ENV
          else
            tar -czf "$dirname.tar.gz" "$dirname"
            echo "ASSET=$dirname.tar.gz" >> $GITHUB_ENV
          fi
      - name: Generate checksums
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            certutil -hashfile "$ASSET" SHA256 > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi
      - name: Upload release archive
        if: github.event_name == 'release' || github.event.inputs.upload == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: |-
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

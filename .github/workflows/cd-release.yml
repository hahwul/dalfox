---
name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to use for the build (e.g. v3.0.1-test)'
        required: true
        default: 'v0.0.0-test'
      upload:
        description: 'Upload artifacts to a release (only works on actual releases)'
        required: true
        default: false
        type: boolean
env:
  CARGO_TERM_COLOR: always
jobs:
  build-and-upload:
    name: Build and upload
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # Required to upload release assets
    strategy:
      matrix:
        include:
          # Linux targets
          - build: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - build: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            use_cross: false
          # Linux musl (static)
          - build: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: false
            musl: true
          - build: linux-aarch64-musl
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            use_cross: false
            musl: true
          # macOS targets
          - build: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - build: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false # Apple Silicon Macs can build for both architectures natively
          # Windows targets
          - build: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          fi
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Install musl tools
        if: matrix.musl == true
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Configure x86_64 musl linker
        if: matrix.musl == true && matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> $GITHUB_ENV

      - name: Configure aarch64 musl linker
        if: matrix.musl == true && matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc" >> $GITHUB_ENV
      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --verbose --release --target ${{ matrix.target }}
          else
            cargo build --verbose --release --target ${{ matrix.target }}
          fi

      # --- Debian / RPM packaging (only for glibc Linux targets) ---
      - name: Install cargo-deb and cargo-generate-rpm
        if: |
          matrix.target == 'x86_64-unknown-linux-gnu' ||
          matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      # Copy the cross-compiled binary to the default location that cargo-deb expects
      - name: Prepare binary for packaging tools
        if: |
          matrix.target == 'x86_64-unknown-linux-gnu' ||
          matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/dalfox" target/release/dalfox

      - name: Build Debian package
        if: |
          matrix.target == 'x86_64-unknown-linux-gnu' ||
          matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cargo deb --no-build

      - name: Build RPM package
        if: |
          matrix.target == 'x86_64-unknown-linux-gnu' ||
          matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cargo generate-rpm --no-build

      - name: Rename and checksum packages
        if: |
          matrix.target == 'x86_64-unknown-linux-gnu' ||
          matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release

          # Rename .deb
          for deb in *.deb; do
            if [ -f "$deb" ]; then
              mv "$deb" "dalfox-$VERSION-linux-${{ matrix.build }}.deb"
            fi
          done

          # Rename .rpm
          for rpm in *.rpm; do
            if [ -f "$rpm" ]; then
              mv "$rpm" "dalfox-$VERSION-linux-${{ matrix.build }}.rpm"
            fi
          done

          # Create checksums
          shasum -a 256 *.deb *.rpm 2>/dev/null | sed 's|  |  |' > /tmp/pkg-checksums.txt || true
          mv /tmp/pkg-checksums.txt . 2>/dev/null || true
      # ---------------------------------------------------------------
      - name: Build archive
        shell: bash
        run: |
          binary_name="dalfox"
          dirname="$binary_name-$VERSION-${{ matrix.build }}"
          mkdir "$dirname"

          # Move the appropriate binary into the archive directory
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv "target/${{ matrix.target }}/release/$binary_name.exe" "$dirname"
          else
            mv "target/${{ matrix.target }}/release/$binary_name" "$dirname"
          fi

          # Create the appropriate archive format for each OS
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$dirname.zip" "$dirname"
            echo "ASSET=$dirname.zip" >> $GITHUB_ENV
          else
            tar -czf "$dirname.tar.gz" "$dirname"
            echo "ASSET=$dirname.tar.gz" >> $GITHUB_ENV
          fi
      - name: Generate checksums
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            certutil -hashfile "$ASSET" SHA256 > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi
      - name: Upload release archive
        if: github.event_name == 'release' || github.event.inputs.upload == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: |-
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

      - name: Upload Debian and RPM packages
        if: |
          (github.event_name == 'release' || github.event.inputs.upload == 'true') &&
          (matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/${{ matrix.target }}/release/dalfox-*.deb
            target/${{ matrix.target }}/release/dalfox-*.rpm
            target/${{ matrix.target }}/release/dalfox-*.deb.sha256
            target/${{ matrix.target }}/release/dalfox-*.rpm.sha256

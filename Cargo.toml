[package]
name = "dalfox"
version = "3.0.0-dev.1"
edition = "2024"
authors = ["hahwul"]
description = "Dalfox is a powerful open-source XSS scanner and utility focused on automation"
license = "MIT"

[dependencies]
clap = { version = "4.0", features = ["derive", "env"] }
url = "2.0"
reqwest = { version = "0.11", features = ["socks", "multipart", "json"] }
scraper = "0.18"
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
indicatif = "0.18"
urlencoding = "2.1"
base64 = "0.22"
chrono = "0.4"
toml = "0.8"
axum = "0.7"
sha2 = "0.11"
hex = "0.4"
regex = "1"
rmcp = { version = "0.8.0", features = ["server", "macros"] }
schemars = { version = "1", features = ["derive"] }
oxc_parser = "0.97.0"
oxc_ast = "0.97.0"
oxc_allocator = "0.97.0"
oxc_span = "0.97.0"

[profile.release]
lto = true
codegen-units = 1
strip = "symbols"
